  <!-- Divider atas -->
  <line x1="80" y1="330" x2="460" y2="330" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
  <path d="M510 320 L530 330 L510 340 L490 330 Z" fill="#C9A96E" opacity="0.7"/>
