  <path d="M510 1480 L530 1490 L510 1500 L490 1490 Z" fill="#C9A96E" opacity="0.7"/>
  <line x1="620" y1="1490" x2="1000" y2="1490" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
  <text x="540" y="1880" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="28" fill="#C9A96E" opacity="0.3">invitara.id</text>
