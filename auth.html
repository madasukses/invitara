<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — Invitara</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='52'>💍</text></svg>">
<link rel="stylesheet" href="css/style.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; background:var(--ivory); }
.auth-wrap { width:100%; max-width:420px; }
.auth-card { background:var(--white); border-radius:24px; border:1px solid var(--border); padding:40px 32px; box-shadow:0 16px 48px rgba(44,36,32,.07); }
.auth-logo { text-align:center; margin-bottom:32px; }
.auth-logo-icon { width:56px; height:56px; background:linear-gradient(135deg,var(--rose),var(--gold)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; margin:0 auto 12px; }
.auth-logo-text { font-family:'Playfair Display',serif; font-size:24px; }
.auth-tabs { display:flex; background:var(--ivory); border-radius:10px; padding:4px; margin-bottom:28px; }
.auth-tab { flex:1; padding:9px; border-radius:7px; font-size:14px; font-weight:500; color:var(--text-muted); text-align:center; cursor:pointer; transition:all .2s; user-select:none; }
.auth-tab.active { background:var(--white); color:var(--text); box-shadow:0 2px 8px var(--border); }
.or-divider { text-align:center; color:var(--text-light); font-size:13px; margin:20px 0; position:relative; }
.or-divider::before, .or-divider::after { content:''; position:absolute; top:50%; width:calc(50% - 28px); height:1px; background:var(--border); }
.or-divider::before { left:0; }
.or-divider::after  { right:0; }
.btn-google { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:12px; border-radius:10px; border:1.5px solid var(--border); background:var(--white); font-size:14px; font-weight:500; color:var(--text); cursor:pointer; font-family:inherit; transition:all .2s; }
.btn-google:hover { background:var(--ivory); }
.back-link { text-align:center; margin-top:16px; }
.back-link a { font-size:13px; color:var(--text-muted); text-decoration:none; }
.back-link a:hover { color:var(--rose); }
.forgot-link { display:block; text-align:right; margin-top:8px; font-size:13px; color:var(--rose); cursor:pointer; background:none; border:none; font-family:inherit; }
</style>
</head>
<body>
<div id="spinner"><div class="spinner"></div></div>
<div id="toast"></div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💍</div>
      <div class="auth-logo-text">Invitara</div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">Undangan Digital Pernikahan</div>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-masuk"  onclick="switchTab('masuk')">Masuk</div>
      <div class="auth-tab"        id="tab-daftar" onclick="switchTab('daftar')">Daftar</div>
    </div>

    <!-- Form Masuk -->
    <div id="form-masuk">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="login-email" class="form-input" placeholder="nama@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Kata Sandi</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn btn-primary btn-block" style="padding:13px;" onclick="doLogin()">
        <i class="ti ti-login" style="font-size:16px;"></i> Masuk
      </button>
      <button class="forgot-link" onclick="doForgotPassword()">Lupa kata sandi?</button>
    </div>

    <!-- Form Daftar -->
    <div id="form-daftar" style="display:none;">
      <div class="form-group">
        <label class="form-label">Nama Lengkap</label>
        <input type="text" id="reg-nama" class="form-input" placeholder="Nama Anda" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="reg-email" class="form-input" placeholder="nama@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Kata Sandi</label>
        <input type="password" id="reg-password" class="form-input" placeholder="Min. 8 karakter" autocomplete="new-password"
          onkeydown="if(event.key==='Enter') doRegister()">
      </div>
      <button class="btn btn-primary btn-block" style="padding:13px;" onclick="doRegister()">
        <i class="ti ti-user-plus" style="font-size:16px;"></i> Buat Akun
      </button>
      <p style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:10px;">
        Dengan mendaftar, Anda menyetujui <a href="#" style="color:var(--rose);">Syarat & Ketentuan</a> kami.
      </p>
    </div>

    <div class="or-divider">atau</div>

    <button class="btn-google" onclick="doGoogleLogin()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Lanjutkan dengan Google
    </button>

    <div class="back-link">
      <a href="index.html">← Kembali ke beranda</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  // Cek sudah login
  const session = await getSession()
  if (session) {
    const profile = await getProfile(session.user.id)
    window.location.href = profile?.role === 'admin' ? 'dashboard-admin.html' : 'dashboard-customer.html'
    return
  }
  // Cek tab dari URL ?tab=daftar
  const params = new URLSearchParams(window.location.search)
  if (params.get('tab') === 'daftar') switchTab('daftar')
})

function switchTab(tab) {
  document.getElementById('tab-masuk').classList.toggle('active',  tab === 'masuk')
  document.getElementById('tab-daftar').classList.toggle('active', tab === 'daftar')
  document.getElementById('form-masuk').style.display  = tab === 'masuk'  ? 'block' : 'none'
  document.getElementById('form-daftar').style.display = tab === 'daftar' ? 'block' : 'none'
}
</script>
</body>
</html>
